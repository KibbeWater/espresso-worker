name = "espresso-pass"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[[rules]]
type = "Data"
globs = ["**/*.png"]
fallthrough = true

[[routes]]
pattern = "pass.lrlnet.se/*"
zone_name = "lrlnet.se"

[vars]
PASS_TYPE_IDENTIFIER = "pass.com.kibbewater.coffee-shop"
TEAM_IDENTIFIER = "89625ZHN6X"

# Secrets (set via `npx wrangler secret put <NAME>`):
# PASS_CERTIFICATE_P12_BASE64  — base64-encoded .p12 file
# PASS_CERTIFICATE_PASSWORD    — password for the .p12
# API_KEY                      — shared secret for authenticating app requests
